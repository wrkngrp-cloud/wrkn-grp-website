name: Deploy to GitHub Pages

# Builds the Next.js static export and publishes it to GitHub Pages so the
# full site is served at https://wrkngrp.com/ (custom domain, see
# public/CNAME). main is the single source of truth for the live site.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

          - name: Build static export
     env:
       # Custom domain (wrkngrp.com) serves from root, not a repo
       # subpath, so base path must stay empty even though this is a
       # project (non-org) Pages repo. Do not wire this back to
       # steps.pages.outputs.base_path — that's derived from the repo
       # name, not the custom domain, and will reintroduce the subpath.
       NEXT_PUBLIC_BASE_PATH: ""
     run: npm run build

      # Bypass Jekyll so the _next/ asset folder is served as-is.
      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
