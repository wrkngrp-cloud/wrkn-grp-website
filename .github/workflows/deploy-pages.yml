name: Deploy Sweetness preview to GitHub Pages

# INTERIM SETUP — this branch lives inside wrkn-grp-website until the
# dedicated sweetness-studios-website repo exists. A repo has exactly one
# Pages site and main already serves the WRKN GRP site from it, so this
# workflow deploys a combined artifact: WRKN GRP (built from main) stays
# at the root, Sweetness is served under /sweetness/.
#
# Caveat: pushes to main redeploy only the WRKN root, which drops the
# /sweetness path until this workflow runs again — re-run it from the
# Actions tab (workflow_dispatch) if the preview 404s. Once the site
# moves to its own repo, delete the wrkn build steps and the subpath.
on:
  push:
    branches: [claude/sweetness-studios-website-qoikdn]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Share the Pages concurrency group with main's deploys; newest wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: main
          path: wrkn

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build WRKN GRP site (root)
        working-directory: wrkn
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          npm ci
          npm run build

      - name: Build Sweetness site (/sweetness)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}/sweetness
        run: |
          npm ci
          npm run build

      - name: Combine sites
        run: |
          mkdir -p site
          cp -r wrkn/out/. site/
          mkdir -p site/sweetness
          cp -r out/. site/sweetness/
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
